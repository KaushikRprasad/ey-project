{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Change Password</title>
    <link rel="stylesheet" href="{% static 'accounts/profile/style.css' %}?v=4">
</head>
<body class="password-page">

<div class="password-overlay"></div>

<div class="password-container">

    <h1 class="password-title">Change Password</h1>
    <p class="password-sub">Update your account password securely</p>

    {% if messages %}
        {% for message in messages %}
            <div class="success-msg">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="POST" class="password-form">
        {% csrf_token %}

        <div class="form-group">
            <label>Old Password</label>
            {{ form.old_password }}
        </div>

        <div class="form-group">
            <label>New Password</label>
            {{ form.new_password1 }}
        </div>

        <div class="form-group">
            <label>Confirm New Password</label>
            {{ form.new_password2 }}
        </div>

        <button type="submit" class="update-password-btn">
            Update Password
        </button>

        <a href="{% url 'profile' %}" class="back-btn">
            ← Back
        </a>

    </form>

</div>

</body>
</html>
