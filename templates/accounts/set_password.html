{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Set Password - FinSight</title>
</head>
<style>
/* ============================= */
/* AUTH PAGES (LOGIN/REGISTER) */
/* ============================= */

.auth-page {
    margin: 0;
    padding: 0;
    background: #000;
    height: 100vh;
    font-family: Arial, sans-serif;
    position: relative;
}

.auth-overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(249, 247, 247, 0.7);
}

.auth-container {
    position: relative;
    width: 50vw;
    max-width: 500px;
    background: #000;
    padding: 40px;
    border-radius: 12px;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    color: white;
    z-index: 2;
}

.auth-title {
    text-align: center;
    margin-bottom: 8px;
}

.auth-sub {
    text-align: center;
    font-size: 14px;
    color: #aaa;
    margin-bottom: 30px;
}

.auth-form .form-group {
    margin-bottom: 18px;
}

.auth-form label {
    font-size: 13px;
    display: block;
    margin-bottom: 6px;
    color: #ccc;
}

.auth-form input,
.auth-form select {
    width: 100%;
    padding: 12px;
    border-radius: 6px;
    border: 1px solid #333;
    background: #111;
    color: white;
    outline: none;
}

.auth-form input:focus,
.auth-form select:focus {
    border-color: #D4AF37;
}

.auth-btn {
    width: 100%;
    padding: 12px;
    background: #D4AF37;
    border: none;
    border-radius: 6px;
    font-weight: bold;
    margin-top: 10px;
    cursor: pointer;
}

.auth-btn:hover {
    background: #c9a52f;
}

.auth-footer {
    text-align: center;
    margin-top: 20px;
    font-size: 14px;
}

.auth-footer a {
    color: #D4AF37;
    text-decoration: none;
}

.error-msg {
    background: #330000;
    color: #ff6b6b;
    padding: 10px;
    border-radius: 6px;
    margin-bottom: 15px;
    text-align: center;
}
</style>

<body class="auth-page">

<div class="auth-overlay"></div>

<div class="auth-container">

    <h1 class="auth-title">Set Your Password</h1>
    <p class="auth-sub">Create your secure password</p>

    <form method="POST" class="auth-form">
        {% csrf_token %}
        
        {{ form.new_password1.label_tag }}
        {{ form.new_password1 }}

        {{ form.new_password2.label_tag }}
        {{ form.new_password2 }}

        <button type="submit" class="auth-btn">
            Set Password
        </button>
    </form>

</div>

</body>
</html>
